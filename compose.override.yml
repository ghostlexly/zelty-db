services:
  zelty-db-backend:
    command: npm run start:dev
    environment:
      - NODE_ENV=development
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules

  zelty-db-caddy:
    image: lunisoft/zelty-db:caddy
    build:
      context: ./caddy
    volumes:
      - ./caddy/logs:/var/log/caddy:z
      - caddy_data:/data
      - caddy_config:/config
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config: