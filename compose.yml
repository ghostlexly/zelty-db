services:
  # ===================================================================================================================================================================================
  zelty-db-backend:
    image: lunisoft/zelty-db:backend
    build:
      context: ./backend
    environment:
      - NODE_ENV=production
      - FORCE_COLOR=1
      - DISPLAY=${X11_DISPLAY}
      - APP_PORT=${APP_PORT}
      - APP_BASE_URL=${APP_BASE_URL}
      - APP_DATABASE_CONNECTION_URL=${APP_DATABASE_CONNECTION_URL}
      - APP_REDIS_HOST=${APP_REDIS_HOST}
      - APP_REDIS_PORT=${APP_REDIS_PORT}
      - API_ZELTY_KEY=${API_ZELTY_KEY}
    volumes:
      - ./backend/logs:/usr/src/app/logs
    depends_on:
      - zelty-db-postgres
      - zelty-db-redis
    networks:
      - lunisoft
    tty: true
    restart: unless-stopped
  # ===================================================================================================================================================================================
  zelty-db-redis:
    image: redis:8.2.2
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - lunisoft
    restart: unless-stopped
  # ===================================================================================================================================================================================
  zelty-db-postgres:
    image: postgres:17.2
    expose:
      - "5432"
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=lunisoft
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${PROJECT_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lunisoft
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  lunisoft:
    external: true